<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal-I | Login</title>
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <header class="login-header">
            <div class="logo">Legal-<span>I</span></div>
        </header>

        <div class="form-container">
            <div class="form-box login active">
                <form action="/login" method="post">
                    <h2>Login to Your Account</h2>
                    <div class="input-group">
                        <div class="input-box">
                            <input type="text" name="email" placeholder="Email or Username" required>
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="input-box">
                            <input type="password" name="password" placeholder="Password" required>
                            <i class="fas fa-lock"></i>
                        </div>
                    </div>
                    <div class="login-options">
                        <label class="remember-me">
                            <input type="checkbox">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>
                    <button type="submit"  class="btn btn-primary">Login</button>
                    <div class="divider">
                        <span>or continue with</span>
                    </div>
                    <div class="social-login">
                        <a href="#" class="social-btn google">
                            <i class="fab fa-google"></i>
                        </a>
                        <a href="#" class="social-btn linkedin">
                            <i class="fab fa-linkedin-in"></i>
                        </a>
                        <a href="#" class="social-btn microsoft">
                            <i class="fab fa-microsoft"></i>
                        </a>
                    </div>
                    <div class="register-link">
                        Don't have an account? <a href="create-account.html" id="show-register">Create account</a>
                    </div>
                </form>
            </div>

            
        </div>
    </div>

    <script src="/css/main.js"></script>
</body>
</html>
